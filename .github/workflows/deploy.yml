name: Build and Deploy

env:
  GODOT_VERSION: 4.6
  ITCH_USERNAME: rsandfield
  ITCH_GAME_ID: lady-lucks-door

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  export-web:
    name: Web Export
    runs-on: ubuntu-latest
    outputs:
      artifact-id: ${{ steps.upload-artifact.outputs.artifact-id }}
    container:
      image: docker://barichello/godot-ci:4.6
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: true
          sparse-checkout: |
            *
            !tools/web
          sparse-checkout-cone-mode: false
      - name: Setup
        run: |
          mkdir -v -p build/web ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
      - name: Import resources once
        continue-on-error: true
        run: godot --headless -v --import
      - name: Web Build
        run: godot --headless -v --export-release "Web" ./build/web/index.html
      - name: Upload Artifact
        id: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: build/web

  deploy-itch:
    name: Deploy to Itch.io
    runs-on: ubuntu-latest
    needs: export-web
    steps:
      - name: Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: web
          path: build/web
      - name: Deploy to Itch.io
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey: ${{ secrets.BUTLER_API_KEY }}
          gameData: ./build/web
          itchUsername: ${{ env.ITCH_USERNAME }}
          itchGameId: ${{ env.ITCH_GAME_ID }}
          buildChannel: web
          buildNumber: ${{ github.run_number }}

  cleanup:
    name: Cleanup Artifacts
    runs-on: ubuntu-latest
    needs: [export-web, deploy-itch]
    if: always() && needs.export-web.result == 'success'
    steps:
      - name: Delete Artifact
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.deleteArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: parseInt('${{ needs.export-web.outputs.artifact-id }}')
            });
